name: Release 3X-UI Android

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Get Xray latest version
        id: xray
        run: |
          XRAY_VERSION=$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$XRAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "Xray version: $XRAY_VERSION"

      - name: Build 3X-UI Android (arm64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags '-s -w' -o x-ui -v .
          file x-ui

      - name: Package release
        run: |
          mkdir -p release/bin

          # Panel binary
          mv x-ui release/

          # Download Xray Android arm64
          cd release/bin
          XRAY_URL="https://github.com/XTLS/Xray-core/releases/download/${{ steps.xray.outputs.version }}"
          wget -q "${XRAY_URL}/Xray-android-arm64-v8a.zip"
          unzip Xray-android-arm64-v8a.zip
          rm -f Xray-android-arm64-v8a.zip

          # Rename xray binary
          mv xray xray-linux-arm64

          # Replace geo databases with latest
          rm -f geoip.dat geosite.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          wget -q -O geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          wget -q -O geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat

          cd ../..

      - name: Create tarball
        run: mv release x-ui && tar -zcvf x-ui-android-arm64.tar.gz x-ui

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: x-ui-android-arm64
          path: ./x-ui-android-arm64.tar.gz

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        if: |
          (github.event_name == 'release' && github.event.action == 'published') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          file: x-ui-android-arm64.tar.gz
          asset_name: x-ui-android-arm64.tar.gz
          overwrite: true
          prerelease: true
